  - 炎症、GLUT4、代谢组、菌群、心脏形态是机制层或伴随层，不自动升级为临床终点
  - 猫内证据优先，跨物种只能作为背景
  - Evidence label必须区分：直接原文事实、多文献来源支持、分析推断
